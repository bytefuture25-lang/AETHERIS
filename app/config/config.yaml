application:
  name: "ÆTHERIS"
  version: "0.1.0"
  codename: "Genesis"
  author: "Harsh Kumar Sharma"
  description: "Personal AI Operating Intelligence"
  environment: "development"

window:
  title: "ÆTHERIS"
  width: 1280
  height: 720
  min_width: 1000
  min_height: 650
  resizable: true
  fullscreen: false

theme:
  mode: "dark"
  accent: "#00D4FF"
  font: "Segoe UI"

logging:
  enabled: true
  level: "INFO"
  file: "logs/aetheris.log"

debug:
  enabled: true

voice:
  enabled: false
  wake_word: "Aetheris"
  language: "en-US"
  input_device: "default"
  output_device: "default"

ai:
  provider: "ollama"
  model: "qwen3:4b"
  temperature: 0.4
  max_tokens: 1536
  context_length: 20
  streaming: true
  fallback_enabled: true

memory:
  enabled: true
  database: "data/aetheris.db"
  auto_save: true
  session_limit: 20
  max_relevant_memories: 8

automation:
  enabled: false

internet:
  enabled: true
  timeout: 15

plugins:
  enabled: true
  directory: "plugins"

security:
  safe_mode: true
  require_confirmation: true

paths:
  assets: "assets"
  logs: "logs"
  data: "data"
  models: "models"
  plugins: "plugins"

developer:
  show_debug_console: true
  hot_reload: false